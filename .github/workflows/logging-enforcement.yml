name: Logging Enforcement

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  static-logging-check:
    name: Static Logging Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce component logger rules
        run: python development_tools/static_checks/check_channel_loggers.py

  tests-smoke:
    name: Test Smoke
    needs: static-logging-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke test
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          script = Path("development_tools/static_checks/check_channel_loggers.py")
          if not script.exists():
              raise SystemExit("Smoke check failed: static logging check script missing")

          result = subprocess.run([sys.executable, str(script)], check=False)
          raise SystemExit(result.returncode)
          PY

  tooling-policy-consistency:
    name: Tooling Policy Consistency
    needs: static-logging-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run tooling policy consistency tests
        run: python -m pytest tests/development_tools/test_tooling_policy_consistency.py -q
