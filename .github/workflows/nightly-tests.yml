name: Nightly Full Test Suite

on:
  schedule:
    # 06:00 UTC daily (~1 AM Eastern / 10 PM Pacific depending on DST)
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  MHM_TESTING: "1"
  PYTHONUNBUFFERED: "1"
  QT_QPA_PLATFORM: offscreen

jobs:
  nightly-full-suite:
    name: Nightly Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt headless system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libopengl0 \
            libx11-xcb1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xfixes0 \
            libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run nightly full test suite
        run: python development_tools/run_development_tools.py nightly-test-suite --strict

      - name: Summarize nightly results on failure
        if: failure()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          results_path = Path("development_tools/tests/jsons/run_test_suite_nightly_results.json")
          if not results_path.exists():
              print("No nightly results JSON found.")
              raise SystemExit(0)

          payload = json.loads(results_path.read_text(encoding="utf-8"))
          outcome = payload.get("details", {}).get("tier3_test_outcome", {})
          print(f"state: {outcome.get('state')}")
          failed = outcome.get("failed_node_ids") or []
          print(f"failed_node_ids ({len(failed)}):")
          for node_id in failed[:25]:
              print(f"  - {node_id}")
          for phase in payload.get("details", {}).get("phases", []):
              tail = str(phase.get("output_tail") or "").strip()
              if tail:
                  print(f"\n--- {phase.get('name')} output tail ---")
                  print("\n".join(tail.splitlines()[-40:]))
          PY

      - name: Upload nightly results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-suite-results
          path: |
            development_tools/tests/jsons/run_test_suite_nightly_results.json
            development_tools/tests/jsons/test_suite_junit/
